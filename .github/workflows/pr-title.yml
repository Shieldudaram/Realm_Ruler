name: PR Title Check

on:
  pull_request:
    branches: [ main, dev ]
    types: [ opened, edited, synchronize, reopened ]

permissions:
  pull-requests: read

jobs:
  semantic-pr-title:
    name: Validate semantic PR title
    runs-on: ubuntu-latest
    steps:
      - name: Check PR title format
        uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            chore
            docs
            refactor
            perf
            test
            build
            ci
            revert
          requireScope: false
