name: Dev Prerelease

on:
  workflow_dispatch:
    inputs:
      base_version:
        description: "Optional base SemVer (example: 1.2.3). Defaults to gradle.properties version."
        required: false
        type: string

permissions:
  contents: write

jobs:
  prerelease:
    name: Build and publish dev prerelease
    runs-on: self-hosted
    env:
      HYTALE_HOME: ${{ vars.HYTALE_HOME }}
    steps:
      - name: Enforce dev branch
        shell: bash
        run: |
          set -euo pipefail
          if [ "${GITHUB_REF_NAME}" != "dev" ]; then
            echo "This workflow must be run from the dev branch. Current branch: ${GITHUB_REF_NAME}"
            exit 1
          fi

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Java 25
        uses: actions/setup-java@v4
        with:
          java-version: "25"
          distribution: "temurin"

      - name: Resolve prerelease version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          input_base="${{ github.event.inputs.base_version }}"
          if [ -n "${input_base}" ]; then
            base_version="${input_base}"
          else
            base_version="$(grep -E '^version=' gradle.properties | head -n1 | cut -d'=' -f2 | tr -d '[:space:]')"
          fi

          if ! [[ "${base_version}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Base version must match MAJOR.MINOR.PATCH. Got: ${base_version}"
            exit 1
          fi

          full_version="${base_version}-dev.${GITHUB_RUN_NUMBER}"
          tag_name="v${full_version}"
          echo "base_version=${base_version}" >> "$GITHUB_OUTPUT"
          echo "full_version=${full_version}" >> "$GITHUB_OUTPUT"
          echo "tag_name=${tag_name}" >> "$GITHUB_OUTPUT"

      - name: Grant execute permission for Gradlew
        run: chmod +x gradlew

      - name: Build prerelease jar
        shell: bash
        run: |
          set -euo pipefail
          if [ -n "${HYTALE_HOME:-}" ]; then
            ./gradlew --no-daemon clean jar -Pversion="${{ steps.version.outputs.full_version }}" "-Phytale_home=${HYTALE_HOME}"
          else
            ./gradlew --no-daemon clean jar -Pversion="${{ steps.version.outputs.full_version }}"
          fi

      - name: Assert expected artifact exists
        shell: bash
        run: |
          set -euo pipefail
          jar_path="build/libs/realm_ruler-${{ steps.version.outputs.full_version }}.jar"
          if [ ! -f "${jar_path}" ]; then
            echo "Expected artifact not found: ${jar_path}"
            ls -la build/libs || true
            exit 1
          fi

      - name: Create prerelease and upload jar
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag_name }}
          name: ${{ steps.version.outputs.tag_name }}
          target_commitish: ${{ github.sha }}
          prerelease: true
          generate_release_notes: true
          files: build/libs/realm_ruler-${{ steps.version.outputs.full_version }}.jar
          fail_on_unmatched_files: true
