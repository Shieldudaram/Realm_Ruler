name: Release

on:
  push:
    branches: [ main ]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    name: Create Release PR or release
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - name: Run Release Please
        id: release
        uses: googleapis/release-please-action@v4
        with:
          config-file: .github/release-please-config.json
          manifest-file: .release-please-manifest.json
          target-branch: main

  build-and-upload:
    name: Build and upload jar asset
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: self-hosted
    env:
      TAG_NAME: ${{ needs.release-please.outputs.tag_name }}
      RP_VERSION: ${{ needs.release-please.outputs.version }}
      HYTALE_HOME: ${{ vars.HYTALE_HOME }}
    steps:
      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ env.TAG_NAME }}
          fetch-depth: 0

      - name: Setup Java 25
        uses: actions/setup-java@v4
        with:
          java-version: "25"
          distribution: "temurin"

      - name: Resolve release version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          if [ -n "${RP_VERSION:-}" ]; then
            release_version="${RP_VERSION}"
          else
            release_version="${TAG_NAME#v}"
          fi
          echo "release_version=${release_version}" >> "$GITHUB_OUTPUT"

      - name: Grant execute permission for Gradlew
        run: chmod +x gradlew

      - name: Build release jar
        shell: bash
        run: |
          set -euo pipefail
          if [ -n "${HYTALE_HOME:-}" ]; then
            ./gradlew --no-daemon clean jar "-Phytale_home=${HYTALE_HOME}"
          else
            ./gradlew --no-daemon clean jar
          fi

      - name: Assert expected artifact exists
        shell: bash
        run: |
          set -euo pipefail
          jar_path="build/libs/realm_ruler-${{ steps.version.outputs.release_version }}.jar"
          if [ ! -f "${jar_path}" ]; then
            echo "Expected artifact not found: ${jar_path}"
            ls -la build/libs || true
            exit 1
          fi

      - name: Upload jar to GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG_NAME }}
          files: build/libs/realm_ruler-${{ steps.version.outputs.release_version }}.jar
          fail_on_unmatched_files: true
